<header class="site-header">

  <!-- Верхняя панель -->
  <div class="header-top-bar">
    <div class="header-top-container">
      <nav class="header-top-nav">
        <a routerLink="/projects" routerLinkActive="active-link-small">Проекты</a>
        <a routerLink="/about" routerLinkActive="active-link-small">Обо мне</a>
        <a routerLink="/chat" routerLinkActive="active-link-small">Чат</a>
        <ng-container *ngIf="authService.hasRole('Admin')">
          <a routerLink="/admin" routerLinkActive="active-link-small">Админ-панель</a>
          <a routerLink="/cloud" routerLinkActive="active-link-small">Облако</a>
        </ng-container>
      </nav>
    </div>
  </div>

  <div class="header-container">

    <div class="logo">
      <a routerLink="/">
        <span class="logo-text">SigmaStudio</span>
      </a>
    </div>

    <nav class="header-main-nav">
      <a routerLink="/projects" routerLinkActive="active-link">Проекты</a>
      <a routerLink="/about" routerLinkActive="active-link">Обо мне</a>
      <a routerLink="/chat" routerLinkActive="active-link">Чат</a>

      <ng-container *ngIf="authService.hasRole('Admin')">
        <a routerLink="/admin" routerLinkActive="active-link">Админ-панель</a>
        <a routerLink="/cloud" routerLinkActive="active-link">Облако</a>
      </ng-container>
    </nav>

    <app-user-menu></app-user-menu>

  </div>
</header>
