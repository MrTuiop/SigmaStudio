<div class="auth-container">
  <div class="auth-card">
    <h2>Регистрация</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <!-- Логин -->
      <div class="form-group">
        <label for="userName">Логин</label>
        <input type="text"
               id="userName"
               formControlName="userName"
               class="form-control"
               [class.is-invalid]="registerForm.get('userName')?.invalid && registerForm.get('userName')?.touched" />
        <div class="invalid-feedback" *ngIf="registerForm.get('userName')?.invalid && registerForm.get('userName')?.touched">
          Логин должен быть не менее 3 символов
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email"
               id="email"
               formControlName="email"
               class="form-control"
               [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" />
        <div class="invalid-feedback" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Введите корректный email
        </div>
      </div>

      <!-- Имя (опционально) -->
      <div class="form-group">
        <label for="firstName">Имя</label>
        <input type="text"
               id="firstName"
               formControlName="firstName"
               class="form-control" />
      </div>

      <!-- Фамилия (опционально) -->
      <div class="form-group">
        <label for="lastName">Фамилия</label>
        <input type="text"
               id="lastName"
               formControlName="lastName"
               class="form-control" />
      </div>

      <!-- Пароль -->
      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="password-input-group">
          <input type="password"
                 id="password"
                 formControlName="password"
                 class="form-control"
                 [type]="showPassword ? 'text' : 'password'"
                 [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" />
          <button type="button"
                  class="password-toggle-btn"
                  (click)="togglePasswordVisibility()"
                  title="{{ showPassword ? 'Скрыть пароль' : 'Показать пароль' }}">
            <!-- Иконка Глаз (Открытый) -->
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z" />
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z" />
            </svg>
            <!-- Иконка Глаз (Закрытый) -->
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.335.326-.51.483l.708.709z" />
              <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z" />
              <path d="M3.35 5.47c-.18.16-.35.32-.51.483A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12-.708.708z" />
            </svg>
          </button>
        </div>
        <div class="invalid-feedback" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Пароль должен быть не менее 6 символов
        </div>
      </div>

      <!-- Подтверждение пароля -->
      <div class="form-group">
        <label for="confirmPassword">Подтвердите пароль</label>
        <div class="password-input-group">
          <input type="password"
                 id="confirmPassword"
                 formControlName="confirmPassword"
                 class="form-control"
                 [type]="showConfirmPassword ? 'text' : 'password'"
                 [class.is-invalid]="registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched" />
          <button type="button"
                  class="password-toggle-btn"
                  (click)="toggleConfirmPasswordVisibility()"
                  title="{{ showConfirmPassword ? 'Скрыть пароль' : 'Показать пароль' }}">
            <!-- Иконка Глаз (Открытый) -->
            <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z" />
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z" />
            </svg>
            <!-- Иконка Глаз (Закрытый) -->
            <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.335.326-.51.483l.708.709z" />
              <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z" />
              <path d="M3.35 5.47c-.18.16-.35.32-.51.483A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12-.708.708z" />
            </svg>
          </button>
        </div>
        <div class="invalid-feedback" *ngIf="registerForm.hasError('passwordMismatch')">
          Пароли не совпадают
        </div>
      </div>

      <!-- Сообщения -->
      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
      <div class="alert alert-success" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <!-- Кнопка регистрации -->
      <button type="submit"
              class="btn btn-primary"
              [disabled]="isLoading">
        <span *ngIf="isLoading">Регистрация...</span>
        <span *ngIf="!isLoading">Зарегистрироваться</span>
      </button>
    </form>

    <!-- Ссылка на вход -->
    <div class="auth-footer">
      <p>Уже есть аккаунт? <a routerLink="/login">Войти</a></p>
    </div>
  </div>
</div>
